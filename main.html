
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Semantic Navbar and Images</title>

    <style>
        nav {
            background-color: #333;
            padding: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        nav a {
            color: white;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            margin-top: 20px;
        }

        .images {
            text-align: center;
        }

        .images img {
            margin: 10px;
        }
    </style>
</head>

<body>

<!-- ================= NAVBAR ================= -->
<nav>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About us</a></li>
        <li><a href="#">Contact us</a></li>
    </ul>
</nav>

<!-- ================= HEADING ================= -->
<h2>3 random images</h2>

<!-- ================= IMAGES ================= -->
<div class="images">

    <img src="https://picsum.photos/id/123/200/300" alt="Random image">

    <img src="https://picsum.photos/id/124/200/300" alt="Random image">

    <img src="https://picsum.photos/id/125/200/300" alt="Random image">

</div>

</body>
</html>
